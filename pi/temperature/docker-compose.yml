version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Z-Wave Prometheus Exporter Stack
#
# Services:
#   zwave-js-ui   — Z-Wave JS UI (formerly zwavejs2mqtt)
#                   • drives the USB Z-Wave dongle
#                   • exposes WebSocket on :3000 for the exporter
#                   • exposes web UI on :8091 for pairing / debugging
#
#   zwave-exporter — Python Prometheus exporter
#                    • scrapes live values from zwave-js-ui via WebSocket
#                    • exports /metrics on :9100
#
# Quick start:
#   1. Find your dongle's stable device path (see README)
#   2. Copy .env.example to .env and fill in values
#   3. docker compose up -d
#   4. Open http://localhost:8091 to pair your sensor (one-time)
#   5. Scrape http://localhost:9100/metrics with Prometheus
# ─────────────────────────────────────────────────────────────────────────────

services:
  zwave-js-ui:
    image: zwavejs/zwave-js-ui:latest
    container_name: zwave-js-ui
    restart: unless-stopped
    tty: true
    stop_signal: SIGINT
    environment:
      - SESSION_SECRET=${SESSION_SECRET:-changeme_use_a_random_string}
      - ZWAVEJS_EXTERNAL_CONFIG=/usr/src/app/store/.config-db
      - TZ=${TZ:-America/Denver}
    group_add:
      - "20"   # dialout — grants container access to /dev/ttyACM*
    devices:
      # Stable by-id symlink → mapped to /dev/ttyACM0 inside the container.
      # The by-id path survives reboots; ttyACM0 number can shift if other
      # ACM devices are present.
      - "/dev/serial/by-id/usb-Zooz_800_Z-Wave_Stick_533D004242-if00:/dev/ttyACM0"
    volumes:
      # Pairing state (network keys, node DB) lives here.
      # Back this up — losing it means re-pairing all devices.
      - zwave-config:/usr/src/app/store
      # Pre-paired network cache (home ID f3c91f96). Bind-mounting this
      # directory avoids re-pairing after migrating from macOS.
      - ./cache:/usr/src/app/store/.config-db/cache
    ports:
      - "8091:8091"   # Web UI  (pair here, then you can close the port remotely)
      - "3001:3000"   # WS API  (for pair.py — host port 3001 avoids conflict with other local services)
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  zwave-exporter:
    build:
      context: ./exporter
    container_name: zwave-exporter
    restart: unless-stopped
    depends_on:
      zwave-js-ui:
        condition: service_healthy
    environment:
      - ZWAVE_WS_URL=ws://zwave-js-ui:3000
      - METRICS_PORT=9100
    ports:
      - "9100:9100"   # Prometheus scrape endpoint

  cf-scrape:
    env_file:
        - ./cf-scrape/.env        # secrets — gitignored
    build:
      context: ./cf-scrape   # path relative to your compose file
      dockerfile: Dockerfile
    image: cf-metrics-scraper:latest
    container_name: cf-metrics-scraper
    restart: unless-stopped
 
    # Needed on Linux to resolve host.docker.internal → host gateway IP.
    # Remove if the exporter is a sibling container instead.
    extra_hosts:
      - "host.docker.internal:host-gateway"
 
    environment:
      # ── Metrics source ──────────────────────────────────────────────────
      # Scenario A (sibling container):  http://your-exporter-service:9100/metrics
      # Scenario B (host process):       http://host.docker.internal:9100/metrics
      METRICS_URL: "http://host.docker.internal:9100/metrics"
 
      # ── Cloudflare Worker ───────────────────────────────────────────────
      # mvoed to env file
 
      # ── Sensor IDs stored in D1 ─────────────────────────────────────────
      SENSOR_ID_TEMP: "house_temp"
      SENSOR_ID_HUM:  "house_humidity"
 
      # ── Scrape interval ─────────────────────────────────────────────────
      SCRAPE_INTERVAL: "300"   # seconds (5 minutes)
 
      # ── Optional ────────────────────────────────────────────────────────
      # LOG_LEVEL: "DEBUG"     # uncomment for verbose output
      # RUN_ONCE: "true"       # scrape once and exit (useful for testing)
 
    # Uncomment if the exporter is a sibling container:
    # depends_on:
    #   - your-zwave-exporter-service
 
    # Optional: resource limits — this service is very light
    # deploy:
    #   resources:
    #     limits:
    #       memory: 64m
    #       cpus: "0.1"


volumes:
  zwave-config:
    # This volume contains your Z-Wave network keys and node pairing state.
    # To move to a remote machine:
    #   docker run --rm -v zwave-exporter_zwave-config:/data -v $(pwd):/backup \
    #     alpine tar czf /backup/zwave-config.tar.gz -C /data .
    # Then restore on the target:
    #   docker run --rm -v zwave-exporter_zwave-config:/data -v $(pwd):/backup \
    #     alpine tar xzf /backup/zwave-config.tar.gz -C /data
